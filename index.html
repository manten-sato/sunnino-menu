<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンニーノ メニュー</title>

<style>
/* 全体 */
body {
  margin: 0;
  font-family: sans-serif;
  background: transparent; /* ← iframe用：背景消す */
}

/* 中央寄せコンテナ */
.wrapper {
  max-width: 800px;
  margin: 0 auto;
  padding: 8px; /* ← 余白最小化 */
  text-align: center;
}

/* タイトル＋イラスト */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px; /* ← 少し詰める */
}

/* タイトル */
.header-text {
  text-align: left;
}

h1 {
  margin: 4px 0;
  font-size: 22px;
}

p {
  margin: 2px 0;
  font-size: 14px;
}

/* イラスト */
.header img {
  height: 70px;
}

/* メニュー */
.menu {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* 画像 */
.menu img {
  width: 220px;
  margin: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.menu img:hover {
  opacity: 0.85;
}

/* スマホ対応 */
@media (max-width: 600px) {

  .header {
    flex-direction: column;
  }

  .header-text {
    text-align: center;
  }

  .header img {
    height: 100px;
  }

  .menu img {
    width: 90%;
  }
}
</style>

</head>

<body>

<div class="wrapper">

  <!-- タイトル＋イラスト -->
  <div class="header">
    <div class="header-text">
      <h1>サンニーノ メニュー</h1>
      <p>画像をクリックすると拡大できます</p>
    </div>

    <img src="manten_ramen.png">
  </div>

  <!-- メニュー -->
  <div class="menu">

    <a href="menu1.jpg" target="_blank">
      <img src="menu1_thumb.jpg">
    </a>

    <a href="menu2.jpg" target="_blank">
      <img src="menu2_thumb.jpg">
    </a>

    <a href="menu3.jpg" target="_blank">
      <img src="menu3_thumb.jpg">
    </a>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンニーノ メニュー</title>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #f9f9f9;
}

/* タイトル */
h1 {
  margin-bottom: 10px;
}

/* 横並び */
.container {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

/* メニュー画像 */
.menu img {
  width: 250px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.menu img:hover {
  opacity: 0.8;
}

/* イラスト */
.illust img {
  height: 300px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* スマホ対応 */
@media (max-width: 600px) {
  .container {
    flex-direction: column;
    align-items: center;
  }

  .menu img {
    width: 90%;
  }

  .illust img {
    height: auto;
    width: 70%;
  }
}
</style>

</head>

<body>

<h1>サンニーノ メニュー</h1>
<p>画像をクリックすると拡大できます</p>

<div class="container">

  <!-- 左：メニュー -->
  <div class="menu">

    <a href="menu1.jpg" target="_blank">
      <img src="menu1_thumb.jpg">
    </a>

    <a href="menu2.jpg" target="_blank">
      <img src="menu2_thumb.jpg">
    </a>

    <a href="menu3.jpg" target="_blank">
      <img src="menu3_thumb.jpg">
    </a>

  </div>

  <!-- 右：イラスト -->
  <div class="illust">
    <img src="manten_ramen.png">
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンニーノ メニュー</title>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
  background-color: #f9f9f9;
}

/* タイトル＋イラスト */
.header {
  display: flex;
  align-items: center;
  gap: 20px;
}

/* イラスト */
.header img {
  height: 80px;
}

/* メニュー */
.menu {
  margin-top: 20px;
}

.menu img {
  width: 250px;
  margin-right: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.menu img:hover {
  opacity: 0.8;
}

/* スマホ対応 */
@media (max-width: 600px) {
  .header {
    flex-direction: column;
  }

  .header img {
    height: 120px;
  }

  .menu img {
    width: 90%;
  }
}
</style>

</head>

<body>

<!-- タイトル＋イラスト -->
<div class="header">
  <div>
    <h1>サンニーノ メニュー</h1>
    <p>画像をクリックすると拡大できます</p>
  </div>

  <img src="manten_ramen.png">
</div>

<!-- メニュー -->
<div class="menu">

  <a href="menu1.jpg" target="_blank">
    <img src="menu1_thumb.jpg">
  </a>

  <a href="menu2.jpg" target="_blank">
    <img src="menu2_thumb.jpg">
  </a>

  <a href="menu3.jpg" target="_blank">
    <img src="menu3_thumb.jpg">
  </a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンニーノ メニュー</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background-color: #f4f6f8;
  text-align: center;
}

/* 全体中央寄せ */
.wrapper {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* ロゴ部分 */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 10px;
}

/* タイトル */
.header h1 {
  font-size: 28px;
  margin: 0;
}

/* ロゴ画像 */
.header img {
  height: 70px;
}

/* サブテキスト */
.subtitle {
  margin-bottom: 20px;
  color: #555;
}

/* メニュー */
.menu {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.menu img {
  width: 250px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.menu img:hover {
  transform: scale(1.03);
}

/* スマホ対応 */
@media (max-width: 600px) {
  .header {
    flex-direction: column;
  }

  .header img {
    height: 100px;
  }

  .menu img {
    width: 90%;
  }
}
</style>

</head>

<body>

<div class="wrapper">

  <!-- ロゴ風 -->
  <div class="header">
    <img src="manten_ramen.png">
    <h1>サンニーノ メニュー</h1>
  </div>

  <p class="subtitle">画像をクリックすると拡大できます</p>

  <!-- メニュー -->
  <div class="menu">

    <a href="menu1.jpg" target="_blank">
      <img src="menu1_thumb.jpg">
    </a>

    <a href="menu2.jpg" target="_blank">
      <img src="menu2_thumb.jpg">
    </a>

    <a href="menu3.jpg" target="_blank">
      <img src="menu3_thumb.jpg">
    </a>

  </div>

</div>

</body>
</html>

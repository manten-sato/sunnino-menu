<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンニーノ メニュー</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background-color: #f9f9f9;
  display: flex;
  justify-content: center;
}

/* 全体を中央に寄せる箱 */
.wrapper {
  max-width: 800px;
  width: 100%;
  padding: 00px;
  text-align: center;
}

/* タイトル＋イラスト */
.header {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

/* タイトル部分 */
.header-text {
  text-align: left;
}

/* イラスト */
.header img {
  height: 80px;
}

/* メニュー画像 */
.menu {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.menu img {
  width: 220px;
  margin: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.menu img:hover {
  opacity: 0.8;
}

/* スマホ対応 */
@media (max-width: 600px) {

  .header {
    flex-direction: column;
  }

  .header-text {
    text-align: center;
  }

  .header img {
    height: 120px;
  }

  .menu img {
    width: 90%;
  }
}
</style>

</head>

<body>

<div class="wrapper">

  <!-- タイトル＋イラスト -->
  <div class="header">
    <div class="header-text">
      <h1>サンニーノ メニュー</h1>
      <p>画像をクリックすると拡大できます</p>
    </div>

    <img src="manten_ramen.png">
  </div>

  <!-- メニュー -->
  <div class="menu">

    <a href="menu1.jpg" target="_blank">
      <img src="menu1_thumb.jpg">
    </a>

    <a href="menu2.jpg" target="_blank">
      <img src="menu2_thumb.jpg">
    </a>

    <a href="menu3.jpg" target="_blank">
      <img src="menu3_thumb.jpg">
    </a>

  </div>

</div>

</body>
</html>
